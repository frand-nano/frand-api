[package]
version = "0.1.1"
edition = "2021"
license = "MIT"
authors = [ "frand-nano <frand.nano@gmail.com>" ]
name = "api"

[lib]
name = "api"
path = "src/lib.rs"

[[bin]]
name = "api_server"
path = "src/main.rs"

[dependencies]
rocket = { version = "0.5.1", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
simple_logger = "5.0"
dotenvy = "0.15"

[dev-dependencies]
